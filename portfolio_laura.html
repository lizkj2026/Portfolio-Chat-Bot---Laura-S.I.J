<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura Izquierdo // Portfolio OS</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'void-bg': '#050505',
                        'void-surface': '#0a0a0a',
                        'void-border': '#1a1a1a',
                        'cyber-pink': '#ff71ce',
                        'cyber-pink-dim': '#b967ff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #e2e8f0;
            overflow: hidden;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(255, 113, 206, 0.5), 0 0 20px rgba(255, 113, 206, 0.3);
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff71ce;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 113, 206, 0.1);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 50;
        }

        .custom-audio-player::-webkit-media-controls-panel {
            background-color: #0a0a0a;
        }
        .custom-audio-player::-webkit-media-controls-current-time-display,
        .custom-audio-player::-webkit-media-controls-time-remaining-display {
            color: #ff71ce;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Icons Helper ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const LucideIcon = lucide.icons[name] || lucide.icons.HelpCircle;
            return <LucideIcon size={size} className={className} />;
        };

        // --- Data ---
        const PROJECTS = [
            {
                id: 'imagenes-ia',
                title: 'IA Image Comparison',
                description: 'Comparativa de imágenes generadas por diferentes modelos de IA utilizando un mismo prompt.',
                image: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/RSxBcknSWisotfUz.jpg',
                gallery: [
                    'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/RSxBcknSWisotfUz.jpg',
                    'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/GpAHfcFGTnDIvqjQ.png',
                    'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/OCBAsPDOXmKJEAJk.png'
                ],
                tags: ['Leonardo.ai', 'Nanobanana', 'Flux'],
                technicalDetails: 'Análisis de consistencia semántica y calidad estética entre modelos competitivos.'
            },
            {
                id: 'agentes-voz',
                title: 'Voice AI Agents',
                description: 'Prototipos de agentes de voz para empresas, diseñados para interacciones naturales.',
                image: 'https://picsum.photos/seed/voice-ai/800/600',
                tags: ['STT/TTS', 'VUI', 'Simulation'],
                technicalDetails: 'Diseño de interfaces de usuario de voz (VUI) optimizadas.',
                videoTracks: [
                    { name: 'PROYECTO IBERDROLA', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663424777987/JysrUiQvxDZNUaDR.mp4' },
                    { name: 'SEATCUPRA', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663424777987/OQdvyMEKDpUzDChQ.mp4' }
                ]
            },
            {
                id: 'musica-ia',
                title: 'AI Music Generation',
                description: 'Exploración de composiciones musicales generadas íntegramente mediante algoritmos de IA.',
                image: 'https://picsum.photos/seed/ai-music/800/600',
                tags: ['Audio AI', 'Music Theory'],
                technicalDetails: 'Uso de modelos generativos de audio para la creación de pistas ambientales.',
                audioTracks: [
                    { name: 'Top Verano 2026', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/RtWdsHWRwgvdEeen.mp3' },
                    { name: 'Ay, Fedito', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/dJInQsxToKCeESHC.mp3' },
                    { name: 'Fedito - Your Intelligent Virtual Assistant', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/VREcAHHwGSRyTmfu.mp3' },
                    { name: 'Flow de Fedito', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/RARQnNpgVlDEVOwR.mp3' },
                    { name: 'IA en el Beat', url: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/OUCDcFaacgvMRgum.mp3' }
                ]
            },
            {
                id: 'cv-infographic',
                title: 'Currículum Vitae',
                description: 'Infografía interactiva del perfil profesional de Laura Izquierdo.',
                image: 'https://picsum.photos/seed/cv/800/600',
                tags: ['Diseño', 'Docencia', 'IA'],
                technicalDetails: 'Visualización estructurada de experiencia laboral y habilidades.'
            },
            {
                id: 'proyectos-diseno',
                title: 'Portafolio de Diseño Gráfico',
                description: 'Selección de proyectos de Identidad Visual, Logotipos y Dirección de Arte.',
                image: 'https://picsum.photos/seed/graphic-design/800/600',
                tags: ['Branding', 'Adobe Illustrator', 'Logo Design'],
                technicalDetails: 'Especialidad en identidad visual coherente y memorable.',
                pdfUrl: 'https://files.catbox.moe/gifo73.pdf'
            },
            {
                id: 'perfil-laura',
                title: 'Perfil Profesional',
                description: 'Laura es una profesional creativa y tecnológica multidisciplinar.',
                image: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663437480160/hOlorNMQVsHjsKDR.jpg',
                tags: ['Creativa', 'Tecnológica', 'Líder'],
                technicalDetails: 'Perfil multidisciplinar con enfoque en innovación.'
            },
            {
                id: 'contacto-laura',
                title: 'Contacto',
                description: 'Canales oficiales de comunicación de Laura Izquierdo.',
                image: 'https://picsum.photos/seed/contact/800/600',
                tags: ['Email', 'Instagram', 'Networking'],
                technicalDetails: 'Enlaces directos a plataformas profesionales.'
            },
            {
                id: 'chatbots-empresa',
                title: 'Enterprise Chatbots',
                description: 'Simulación de asistentes conversacionales inteligentes para grandes corporaciones.',
                image: 'https://picsum.photos/seed/chatbot/800/600',
                tags: ['NLP', 'UX Design', 'Enterprise'],
                technicalDetails: 'Arquitectura de flujos complejos con manejo de contexto.'
            }
        ];

        const KNOWLEDGE_BASE = {
            'hola': { response: '¡Hola! Soy el asistente de Laura Izquierdo. ¿En qué puedo ayudarte?' },
            'inicio': { response: '¡Hola! Soy el asistente de Laura Izquierdo. ¿En qué puedo ayudarte?' },
            'proyectos': { response: 'He desplegado varios módulos técnicos: "Imágenes IA", "Chatbots", "Agentes de voz" o "Música IA".' },
            'imagenes': { response: 'mostrando en la pantalla de la derecha imágenes.', projectId: 'imagenes-ia' },
            'imágenes': { response: 'mostrando en la pantalla de la derecha imágenes.', projectId: 'imagenes-ia' },
            'chatbots': { response: 'Iniciando entorno de simulación de Chatbots Empresariales. ¿Cuál quieres probar?', projectId: 'chatbots-empresa' },
            'voz': { response: 'mostrando en la pantalla de la derecha 2 videos " de simulacion de empesas"', projectId: 'agentes-voz' },
            'musica': { response: 'mostrando en la pantalla de la derecha 4 pistas', projectId: 'musica-ia' },
            'música': { response: 'mostrando en la pantalla de la derecha 4 pistas', projectId: 'musica-ia' },
            'cv': { response: 'Mostrando en la ventana de la derecha.', projectId: 'cv-infographic' },
            'contacto': { response: 'Puedes contactar con Laura a través de su correo electrónico (laura2001izji@gmail.com) o redes profesionales (Ig:https://www.instagram.com/lizkj_design/)', projectId: 'contacto-laura' },
            'proyectos diseño': { 
                response: '¡Claro! Desplegando el portafolio de Diseño Gráfico de Laura Sagrario. \n\nComo su asistente experto, te cuento que Laura se especializa en **Identidad Visual** (logotipos, monogramas, tipografías y colores) para crear marcas memorables. \n\nEn este portafolio podrás ver proyectos como:\n• **Marca Personal**: Su propio monograma.\n• **Midnight Suns**: Logo y equipación para un equipo de baloncesto en Valencia.\n• **Maristas Toledo**: 50 Aniversario.\n• **Inmobiliaria en Toledo**: Logotipo empresarial.\n\nElla domina de forma avanzada **Adobe Illustrator (Ai)** y su filosofía se centra en proyectar la personalidad de la marca para conectar emocionalmente. ¿Hay algún proyecto sobre el que quieras saber más?', 
                projectId: 'proyectos-diseno' 
            },
            'default': { response: 'Entiendo. Como asistente de Laura, puedo hablarte de su experiencia o mostrarte sus proyectos.' }
        };

        const CHATBOT_PROFILES = [
            { id: 'correos', name: 'Correos Express', role: 'Logística', description: 'Seguimiento de envíos.', icon: 'Package', color: '#ffcc00' },
            { id: 'ikea', name: 'IKEA', role: 'Customer Care', description: 'Gestión de devoluciones.', icon: 'Home', color: '#0051ba' },
            { id: 'bbva', name: 'BBVA Blue', role: 'Banca Digital', description: 'Asistente financiero.', icon: 'Shield', color: '#004481' },
            { id: 'movistar', name: 'Movistar', role: 'Soporte Técnico', description: 'Diagnóstico de averías.', icon: 'Wifi', color: '#019df4' }
        ];

        // --- Components ---
        const TypewriterText = ({ text }) => {
            const [displayedText, setDisplayedText] = useState("");
            useEffect(() => {
                let i = 0;
                const timer = setInterval(() => {
                    setDisplayedText(text.slice(0, i));
                    i++;
                    if (i > text.length) clearInterval(timer);
                }, 15);
                return () => clearInterval(timer);
            }, [text]);
            return <span>{displayedText}</span>;
        };

        const MusicView = ({ project }) => (
            <div className="space-y-4">
                {project.audioTracks?.map((track, idx) => (
                    <div key={idx} className="glass-panel p-4 rounded-xl border border-void-border">
                        <div className="flex justify-between items-center mb-2">
                            <span className="text-sm font-bold text-white">{track.name}</span>
                            <span className="text-[10px] font-mono text-slate-500">TRACK_0{idx + 1}</span>
                        </div>
                        <audio controls className="w-full h-8 custom-audio-player">
                            <source src={track.url} type="audio/mpeg" />
                        </audio>
                    </div>
                ))}
            </div>
        );

        const DesignPortfolioView = ({ project }) => {
            return (
                <div className="w-full h-full">
                    <div className="glass-panel w-full h-[calc(100vh-250px)] rounded-2xl border border-void-border overflow-hidden">
                        <iframe 
                            src={project.pdfUrl}
                            className="w-full h-full border-none bg-white"
                            title={project.title}
                        />
                    </div>
                    <div className="mt-4 glass-panel p-4 rounded-xl border border-void-border bg-void-surface/5">
                        <p className="text-[10px] font-mono text-cyber-pink uppercase tracking-widest mb-1 italic">Aviso: Los archivos vectoriales (.ai) son propiedad privada de la autora.</p>
                        <p className="text-xs text-slate-400">Portafolio interactivo de Laura Sagrario Izquierdo Jiménez.</p>
                    </div>
                </div>
            );
        };

        const VoiceView = ({ project }) => (
            <div className="space-y-6">
                {project.videoTracks?.map((video, idx) => (
                    <div key={idx} className="glass-panel overflow-hidden rounded-xl border border-void-border">
                        <div className="p-3 border-b border-void-border flex justify-between items-center">
                            <span className="text-sm font-bold text-white">{video.name}</span>
                            <span className="text-[10px] font-mono text-slate-500">VIDEO_0{idx + 1}</span>
                        </div>
                        <video controls className="w-full aspect-video bg-black">
                            <source src={video.url} type="video/mp4" />
                        </video>
                    </div>
                ))}
            </div>
        );

        const CVInfographic = () => (
            <div className="glass-panel p-8 rounded-2xl space-y-8 border border-cyber-pink/20">
                <div className="flex items-center gap-4">
                    <div className="w-16 h-16 rounded-full bg-cyber-pink/20 flex items-center justify-center text-cyber-pink">
                        <Icon name="User" size={32} />
                    </div>
                    <div>
                        <h3 className="text-2xl font-bold font-display">Laura Izquierdo</h3>
                        <p className="text-cyber-pink text-xs uppercase tracking-widest font-bold">Designer & AI Specialist</p>
                    </div>
                </div>
                <div className="grid grid-cols-1 gap-6">
                    <div className="space-y-2">
                        <h4 className="text-xs font-bold uppercase text-slate-500 tracking-widest">Experiencia</h4>
                        <div className="border-l-2 border-void-border pl-4 py-2 space-y-4">
                            <div>
                                <p className="text-sm font-bold">Directora de Arte // Freelance</p>
                                <p className="text-xs text-slate-500">2020 - Presente</p>
                            </div>
                            <div>
                                <p className="text-sm font-bold">Docente de Diseño Gráfico</p>
                                <p className="text-xs text-slate-500">2018 - 2020</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- Main App ---
        function App() {
            const [messages, setMessages] = useState([
                { id: '1', text: 'SISTEMA_INICIADO: Hola, soy el asistente de Laura Izquierdo. ¿Qué módulo deseas explorar hoy?', sender: 'bot', timestamp: new Date() }
            ]);
            const [inputValue, setInputValue] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [currentProject, setCurrentProject] = useState(null);
            const [activeBotId, setActiveBotId] = useState(null);
            const [isRightPanelExpanded, setIsRightPanelExpanded] = useState(false);
            const [suggestions, setSuggestions] = useState(['Quien es Laura', 'PROYECTOS IA', 'PROYECTOS DISEÑO', 'CV', 'Contacto']);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSendMessage = (text) => {
                const messageText = text || inputValue;
                if (!messageText.trim()) return;

                const userMsg = { id: Date.now().toString(), text: messageText, sender: 'user', timestamp: new Date() };
                setMessages(prev => [...prev, userMsg]);
                setInputValue("");
                processResponse(messageText);
            };

            const processResponse = (input) => {
                setIsTyping(true);
                const lowerInput = input.toLowerCase();
                
                let foundKey = 'default';
                for (const key in KNOWLEDGE_BASE) {
                    if (lowerInput.includes(key)) {
                        foundKey = key;
                        break;
                    }
                }

                const { response, projectId } = KNOWLEDGE_BASE[foundKey];

                if (projectId) {
                    const project = PROJECTS.find(p => p.id === projectId);
                    if (project) {
                        setCurrentProject(project);
                        if (projectId === 'proyectos-diseno') {
                            setIsRightPanelExpanded(true);
                        } else {
                            setIsRightPanelExpanded(false);
                        }
                    }
                } else if (!activeBotId) {
                    setCurrentProject(null);
                    setIsRightPanelExpanded(false);
                }

                setTimeout(() => {
                    const botMsg = { id: (Date.now() + 1).toString(), text: response, sender: 'bot', timestamp: new Date() };
                    setMessages(prev => [...prev, botMsg]);
                    setIsTyping(false);

                    if (foundKey === 'proyectos') {
                        setSuggestions(['Imágenes IA', 'Chatbots', 'Agentes de Voz', 'Música IA', 'Atrás']);
                    } else if (foundKey === 'chatbots') {
                        setSuggestions(['Correos Express', 'IKEA', 'BBVA Blue', 'Movistar', 'Atrás']);
                    } else {
                        setSuggestions(['Quien es Laura', 'PROYECTOS IA', 'PROYECTOS DISEÑO', 'CV', 'Contacto']);
                    }
                }, 1000);
            };

            const handleSuggestionClick = (label) => {
                if (label === 'Atrás' || label === 'Inicio') {
                    setActiveBotId(null);
                    setCurrentProject(null);
                    handleSendMessage('inicio');
                } else {
                    handleSendMessage(label);
                }
            };

            return (
                <div className="flex h-screen w-full bg-void-bg text-slate-200 overflow-hidden font-sans relative">
                    <div className="scanline" />
                    
                    {/* Left Side: Chat (60% or 30%) */}
                    <section className={`${isRightPanelExpanded ? 'w-[30%]' : 'w-[60%]'} flex flex-col border-r border-void-border bg-void-bg/50 backdrop-blur-sm transition-all duration-500 ease-in-out`}>
                        <header className="p-6 border-b border-void-border flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-3 h-3 rounded-full bg-cyber-pink animate-pulse shadow-[0_0_10px_#ff71ce]" />
                                <h1 className="font-display font-bold tracking-tighter text-xl uppercase neon-text">LAURA_OS // CORE</h1>
                            </div>
                            <div className="flex gap-4 text-slate-400">
                                <Icon name="Terminal" size={18} className="hover:text-cyber-pink cursor-pointer transition-colors" />
                                <Icon name="Info" size={18} className="hover:text-cyber-pink cursor-pointer transition-colors" />
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
                            <AnimatePresence mode="popLayout">
                                {messages.map((msg) => (
                                    <motion.div
                                        key={msg.id}
                                        initial={{ opacity: 0, y: 10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        className={`flex flex-col ${msg.sender === 'user' ? 'items-end' : 'items-start'}`}
                                    >
                                        <div className={`max-w-[80%] p-4 rounded-2xl shadow-lg ${msg.sender === 'user' ? 'bg-cyber-pink text-void-bg font-medium' : 'glass-panel'}`}>
                                            {msg.sender === 'bot' ? <TypewriterText text={msg.text} /> : msg.text}
                                        </div>
                                    </motion.div>
                                ))}
                            </AnimatePresence>
                            {isTyping && (
                                <div className="flex gap-1 items-center p-2">
                                    <div className="w-1.5 h-1.5 bg-cyber-pink rounded-full animate-bounce" />
                                    <div className="w-1.5 h-1.5 bg-cyber-pink rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                                    <div className="w-1.5 h-1.5 bg-cyber-pink rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-6 bg-void-surface/20 border-t border-void-border">
                            <form onSubmit={(e) => { e.preventDefault(); handleSendMessage(); }} className="relative">
                                <input
                                    type="text"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    placeholder="Selecciona una opción o escribe..."
                                    className="w-full bg-void-bg/50 border border-void-border rounded-xl py-4 px-6 pr-14 focus:outline-none focus:border-cyber-pink/50 transition-all"
                                />
                                <button type="submit" className="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-cyber-pink">
                                    <Icon name="Send" size={20} />
                                </button>
                            </form>
                            <div className="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar">
                                {suggestions.map((label) => (
                                    <button
                                        key={label}
                                        onClick={() => handleSuggestionClick(label)}
                                        className="whitespace-nowrap px-4 py-1.5 rounded-full border border-void-border text-[10px] font-bold uppercase tracking-widest hover:bg-cyber-pink/10 hover:text-cyber-pink transition-all text-slate-400"
                                    >
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Right Side: Gallery (40% or 70%) */}
                    <section className={`${isRightPanelExpanded ? 'w-[70%]' : 'w-[40%]'} bg-void-surface/10 relative overflow-y-auto custom-scrollbar transition-all duration-500 ease-in-out`}>
                        <div className="p-10 space-y-10 relative z-10">
                            <div className="space-y-2">
                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-cyber-pink/60">Módulo_Visual</span>
                                <h2 className="font-display text-4xl font-bold tracking-tighter uppercase neon-text">Galería</h2>
                            </div>

                            <AnimatePresence mode="wait">
                                {!currentProject ? (
                                    <motion.div key="placeholder" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-col items-center justify-center h-[60vh] text-center space-y-6 border border-dashed border-void-border rounded-2xl">
                                        <Icon name="Terminal" size={32} className="text-cyber-pink" />
                                        <p className="text-xs text-slate-600">Utiliza el chat para explorar los proyectos de Laura.</p>
                                    </motion.div>
                                ) : (
                                    <motion.div key={currentProject.id} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} className="space-y-8">
                                        {currentProject.id === 'cv-infographic' ? <CVInfographic /> : (
                                            <>
                                                {currentProject.id === 'musica-ia' ? <MusicView project={currentProject} /> : 
                                                 currentProject.id === 'agentes-voz' ? <VoiceView project={currentProject} /> : 
                                                 currentProject.id === 'proyectos-diseno' ? <DesignPortfolioView project={currentProject} /> : (
                                                    <div className="relative aspect-video rounded-2xl overflow-hidden border border-void-border">
                                                        <img src={currentProject.image} className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" />
                                                    </div>
                                                )}
                                                {currentProject.id !== 'proyectos-diseno' && (
                                                    <div className="space-y-4">
                                                        <h3 className="text-2xl font-bold font-display">{currentProject.title}</h3>
                                                        <p className="text-slate-400 text-sm leading-relaxed">{currentProject.description}</p>
                                                        <div className="glass-panel p-4 rounded-xl border-l-4 border-cyber-pink">
                                                            <p className="text-[10px] font-mono text-slate-300">{currentProject.technicalDetails}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
